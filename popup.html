<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyVoice Bridge</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 320px;
            padding: 16px;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #00ffcc;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaaaaa;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
            background-color: #1e1e1e;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 6px;
            font-family: monospace;
        }
        input:focus {
            outline: none;
            border-color: #00ffcc;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00ffcc;
            color: #000000;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #00ccaa;
        }
        #status {
            margin-top: 12px;
            font-size: 13px;
            color: #00ffcc;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <h3>HandyVoice Bridge</h3>
    
    <label for="connectionKey">Handy Connection Key:</label>
    <input type="password" id="connectionKey" placeholder="Enter your 16-character key..." spellcheck="false" autocomplete="off" />
    
    <button id="saveBtn">Save & Connect</button>
    <div id="status">Key saved securely to local storage.</div>

    <script src="popup.js"></script>
</body>
</html>
